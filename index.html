<script>

window.onload = function () {

    let settings = {
        spd: localStorage.getItem('spd'),
        ctrl: localStorage.getItem('ctrl')
    };

    if (settings.spd)
        document.getElementById('spd' + settings.spd)
        .classList.add('selected');

    if (settings.ctrl)
        document.getElementById('ctrl' + settings.ctrl)
        .classList.add('selected');

    function select(key, val, btn) {

        settings[key] = val;
        localStorage.setItem(key, val);

        btn.parentElement
            .querySelectorAll('button')
            .forEach(b => {
                if (b.id.startsWith(key))
                    b.classList.remove('selected');
            });

        btn.classList.add('selected');
    }

    function initGame() {

        if (!settings.spd || !settings.ctrl) {

            document.getElementById('errorMsg')
                .style.display = 'block';

            return;
        }

        document.getElementById('menu')
            .style.display = 'none';

        document.getElementById('gameContainer')
            .style.display = 'flex';

        if (settings.ctrl === 'movil')
            document.getElementById('tactiles')
                .style.display = 'grid';

        startGame();
    }

    function backToMenu() {

        document.getElementById('gameOver')
            .style.display = 'none';

        document.getElementById('menu')
            .style.display = 'block';

        document.getElementById('gameContainer')
            .style.display = 'none';

        document.getElementById('tactiles')
            .style.display = 'none';
    }

    let currentDir = "RIGHT";
    let nextDir = "RIGHT";

    let s, c, score = 0, game, running = false;

    const canvas = document.getElementById("lienzo");
    const ctx = canvas.getContext("2d");

    let specialFood = null;
    let specialTimer = 0;

    function setDir(newDir) {

        if (newDir == "LEFT" && currentDir != "RIGHT")
            nextDir = "LEFT";

        else if (newDir == "UP" && currentDir != "DOWN")
            nextDir = "UP";

        else if (newDir == "RIGHT" && currentDir != "LEFT")
            nextDir = "RIGHT";

        else if (newDir == "DOWN" && currentDir != "UP")
            nextDir = "DOWN";
    }

    function randomPos() {

        let pos;

        do {

            pos = {
                x: Math.floor(Math.random() * 20) * 20,
                y: Math.floor(Math.random() * 20) * 20
            };

        } while (

            s.some(p =>
                p.x === pos.x &&
                p.y === pos.y
            )

            ||

            (c &&
                c.x === pos.x &&
                c.y === pos.y)

            ||

            (specialFood &&
                specialFood.x === pos.x &&
                specialFood.y === pos.y)
        );

        return pos;
    }

    function startGame() {

        if (game)
            clearInterval(game);

        s = [{ x: 200, y: 200 }];

        currentDir = "RIGHT";
        nextDir = "RIGHT";

        score = 0;

        document.getElementById('scoreVal')
            .innerText = "0";

        specialFood = null;
        specialTimer = 0;

        c = randomPos();

        running = true;

        game = setInterval(
            draw,
            parseInt(settings.spd)
        );
    }

    document.addEventListener("keydown", (e) => {

        if (settings.ctrl !== 'pc')
            return;

        if (e.keyCode == 37)
            setDir("LEFT");

        else if (e.keyCode == 38)
            setDir("UP");

        else if (e.keyCode == 39)
            setDir("RIGHT");

        else if (e.keyCode == 40)
            setDir("DOWN");
    });

    function spawnSpecialFood() {

        specialFood = randomPos();

        specialTimer = 5;

        let countdown = setInterval(() => {

            if (!specialFood) {

                clearInterval(countdown);
                return;
            }

            specialTimer--;

            if (specialTimer <= 0) {

                specialFood = null;
                clearInterval(countdown);
            }

        }, 1000);
    }

    function draw() {

        if (!running)
            return;

        currentDir = nextDir;

        let h = {
            x: s[0].x,
            y: s[0].y
        };

        if (currentDir == "LEFT") h.x -= 20;
        if (currentDir == "UP") h.y -= 20;
        if (currentDir == "RIGHT") h.x += 20;
        if (currentDir == "DOWN") h.y += 20;

        if (
            h.x < 0 ||
            h.x >= 400 ||
            h.y < 0 ||
            h.y >= 400 ||
            s.some(p =>
                p.x == h.x &&
                p.y == h.y
            )
        ) {

            running = false;
            clearInterval(game);

            document.getElementById('finalScore')
                .innerText = "Score Final: " + score;

            document.getElementById('gameOver')
                .style.display = 'block';

            return;
        }

        s.unshift(h);

        if (h.x == c.x && h.y == c.y) {

            score++;

            document.getElementById('scoreVal')
                .innerText = score;

            c = randomPos();

            if (score % 10 === 0 && !specialFood)
                spawnSpecialFood();
        }

        else if (

            specialFood &&
            h.x == specialFood.x &&
            h.y == specialFood.y
        ) {

            score += 5;

            document.getElementById('scoreVal')
                .innerText = score;

            specialFood = null;
        }

        else {
            s.pop();
        }

        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, 400, 400);

        ctx.fillStyle = "red";
        ctx.fillRect(c.x, c.y, 20, 20);

        if (specialFood) {

            const colors = [
                "#ff0000",
                "#ff8800",
                "#ffff00",
                "#00ff00",
                "#00ffff",
                "#0000ff",
                "#ff00ff"
            ];

            ctx.fillStyle =
                colors[
                    Math.floor(Date.now() / 100)
                    % colors.length
                ];

            ctx.fillRect(
                specialFood.x,
                specialFood.y,
                20,
                20
            );

            ctx.fillStyle = "white";
            ctx.font = "12px Arial";

            ctx.fillText(
                specialTimer,
                specialFood.x + 6,
                specialFood.y + 14
            );
        }

        s.forEach((p, i) => {

            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00ff00";

            ctx.fillStyle =
                (i == 0)
                    ? "#004400"
                    : "#00ff00";

            ctx.fillRect(p.x, p.y, 20, 20);
        });

        ctx.shadowBlur = 0;
    }

    // 🔥 IMPORTANTE: hacer funciones accesibles desde HTML
    window.select = select;
    window.initGame = initGame;
    window.backToMenu = backToMenu;
    window.setDir = setDir;

};

</script>
