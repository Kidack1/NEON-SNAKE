<!DOCTYPE html>
<html>
<head>
    <title>NEON SNAKE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .bar {
            background: #333;
            width: 400px;
            padding: 10px;
            text-align: center;
            font-size: 18px;
            border: 2px solid #0f0;
        }

        canvas {
            background: #000;
            border: 4px solid #0f0;
            box-shadow: 0 0 20px #0f0;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px;
            background: #333;
            color: #0f0;
            border: 1px solid #0f0;
        }
    </style>
</head>

<body onclick="focusGame()">

<div class="bar">
    Score: <span id="scoreVal">0</span>
</div>

<canvas id="lienzo" width="400" height="400" tabindex="0"></canvas>

<div class="controls">
    <div></div><button onclick="setDir('UP')">▲</button><div></div>
    <button onclick="setDir('LEFT')">◀</button>
    <button onclick="setDir('DOWN')">▼</button>
    <button onclick="setDir('RIGHT')">▶</button>
</div>

<script>
const canvas = document.getElementById("lienzo");
const ctx = canvas.getContext("2d");

let s = [{x:200,y:200}];
let dir = "RIGHT";
let food = randomPos();
let score = 0;

function focusGame(){
    canvas.focus();
}

function setDir(d){
    if(d=="LEFT" && dir!="RIGHT") dir="LEFT";
    if(d=="RIGHT" && dir!="LEFT") dir="RIGHT";
    if(d=="UP" && dir!="DOWN") dir="UP";
    if(d=="DOWN" && dir!="UP") dir="DOWN";
}

document.addEventListener("keydown",(e)=>{
    if(e.keyCode==37) setDir("LEFT");
    if(e.keyCode==38) setDir("UP");
    if(e.keyCode==39) setDir("RIGHT");
    if(e.keyCode==40) setDir("DOWN");
});

function randomPos(){
    return {
        x: Math.floor(Math.random()*20)*20,
        y: Math.floor(Math.random()*20)*20
    };
}

function loop(){
    let head = {...s[0]};

    if(dir=="LEFT") head.x-=20;
    if(dir=="RIGHT") head.x+=20;
    if(dir=="UP") head.y-=20;
    if(dir=="DOWN") head.y+=20;

    if(
        head.x<0 || head.y<0 ||
        head.x>=400 || head.y>=400 ||
        s.some(p=>p.x==head.x && p.y==head.y)
    ){
        alert("GAME OVER");
        location.reload();
    }

    s.unshift(head);

    if(head.x==food.x && head.y==food.y){
        score++;
        document.getElementById("scoreVal").innerText = score;
        food = randomPos();
    } else {
        s.pop();
    }

    ctx.fillStyle="black";
    ctx.fillRect(0,0,400,400);

    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,20,20);

    s.forEach((p,i)=>{
        ctx.fillStyle = i==0 ? "#00ff00" : "#007700";
        ctx.fillRect(p.x,p.y,20,20);
    });
}

setInterval(loop,120);

// FIX IMPORTANTE PARA WEBVIEWER
window.onload = ()=>{
    canvas.focus();
};

</script>

</body>
</html>
